<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons - Moje CSS Projekty</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 3rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            padding: 0 2rem 4rem 2rem;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            font-size: 1.25rem;
            margin: 0 0 0.5rem 0;
            color: var(--accent);
        }

        .card:hover h2 {
            color: var(--accent-hover);
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>🔘 Buttons</h1>
        <p class="subtitle">Různé styly a interaktivní efekty pro tlačítka</p>
        <a href="../index.html" class="back-link">&larr; Zpět na hlavní stránku</a>
    </header>

    <div class="grid">
        <a href="./animated button/index.html" class="card">
            <h2>Animated Button</h2>
        </a>
        <a href="./dark mode button/index.html" class="card">
            <h2>Dark Mode Button</h2>
        </a>
        <a href="./delete button animation/index.html" class="card">
            <h2>Delete Button Animation</h2>
        </a>
        <a href="./order animation button/order.html" class="card">
            <h2>Order Animation Button</h2>
        </a>
        <a href="./rocket button/index.html" class="card">
            <h2>Rocket Button</h2>
        </a>
        <a href="./rocket button 2/index.html" class="card">
            <h2>Rocket Button 2</h2>
        </a>
    </div>

</body>
</html>
